apiVersion: v1
kind: Service
metadata:
  name: etkx-backend
  namespace: etkx
  labels:
    app: etkx-backend
spec:
  type: ClusterIP
  selector:
    app: etkx-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: etkx-frontend
  namespace: etkx
  labels:
    app: etkx-frontend
spec:
  type: ClusterIP
  selector:
    app: etkx-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
