apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: etkx
  labels:
    app: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4180
          env:
            - name: OAUTH2_PROXY_PROVIDER
              value: keycloak-oidc
            - name: OAUTH2_PROXY_OIDC_ISSUER_URL
              value: https://auth.solvely.pl/realms/bimmerz
            - name: OAUTH2_PROXY_CLIENT_ID
              value: etkx
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: etkx-secrets
                  key: OAUTH2_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: etkx-secrets
                  key: OAUTH2_PROXY_COOKIE_SECRET
            - name: OAUTH2_PROXY_EMAIL_DOMAINS
              value: "*"
            - name: OAUTH2_PROXY_HTTP_ADDRESS
              value: "0.0.0.0:4180"
            - name: OAUTH2_PROXY_REDIRECT_URL
              value: https://etkx.bimmerz.app/oauth2/callback
            - name: OAUTH2_PROXY_UPSTREAMS
              value: http://etkx-frontend:80
            - name: OAUTH2_PROXY_SCOPE
              value: openid email profile
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: etkx
  labels:
    app: oauth2-proxy
spec:
  type: ClusterIP
  selector:
    app: oauth2-proxy
  ports:
    - name: http
      port: 4180
      targetPort: 4180
