apiVersion: apps/v1
kind: Deployment
metadata:
  name: etkx-backend
  namespace: etkx
  labels:
    app: etkx-backend
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etkx-backend
  template:
    metadata:
      labels:
        app: etkx-backend
        tier: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/emdzej/etkx-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: etkx-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: sqlite-data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: etkx-sqlite-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etkx-frontend
  namespace: etkx
  labels:
    app: etkx-frontend
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etkx-frontend
  template:
    metadata:
      labels:
        app: etkx-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/emdzej/etkx-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
