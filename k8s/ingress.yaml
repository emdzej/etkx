apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: etkx-ingress
  namespace: etkx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - etkx.bimmerz.app
      secretName: etkx-tls
  rules:
    - host: etkx.bimmerz.app
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: etkx-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: etkx-frontend
                port:
                  number: 80
