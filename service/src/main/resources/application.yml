server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:./data/etkx.sqlite
    driver-class-name: org.sqlite.JDBC
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.community.dialect.SQLiteDialect

logging:
  level:
    pl.emdzej.etkx: DEBUG
    org.springframework.web: INFO
    org.springframework.jdbc: DEBUG
