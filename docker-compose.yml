services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlite:/app/data/etk.sqlite
    volumes:
      - ./data:/app/data
    networks:
      - etkx

  frontend:
    build:
      context: ./frontend
      args:
        PUBLIC_API_BASE_URL: http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - etkx

networks:
  etkx:
    driver: bridge
