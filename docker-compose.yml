services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlite:/app/data/etkx.db
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.sqlite.JDBC
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
    volumes:
      - ./data:/app/data
    networks:
      - etkx

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8080
    networks:
      - etkx

networks:
  etkx:
    driver: bridge
