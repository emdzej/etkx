server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:/data/etkx.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.community.dialect.SQLiteDialect
